<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="player-container">
        <div class="player-content">
            <div class="top-nav">
                <i class="fa-solid fa-angle-down"></i>
                <span>Now Playing</span>
                <i class="fa-solid fa-list"></i>
            </div>
            
            <div class="album-art">
                <img src="" alt="Album Art" id="cover">
            </div>
            
            <div class="song-details">
                <h2 id="title">Loading...</h2>
                <p id="artist">...</p>
            </div>
            
            <div class="progress-container">
                <div class="time">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
                <input type="range" id="progress-bar" class="slider" min="0" max="100" value="0" step="0.1">
            </div>

            <div class="controls">
                <button class="control-btn" id="shuffle"><i class="fa-solid fa-shuffle"></i></button>
                <button class="control-btn main" id="prev"><i class="fa-solid fa-backward-step"></i></button>
                <button class="control-btn play-pause glow" id="play"><i class="fa-solid fa-play"></i></button>
                <button class="control-btn main" id="next"><i class="fa-solid fa-forward-step"></i></button>
                <button class="control-btn" id="repeat"><i class="fa-solid fa-repeat"></i></button>
            </div>

            <div class="volume-container">
                <i class="fa-solid fa-volume-low" id="vol-icon"></i>
                <input type="range" id="volume-bar" class="slider" min="0" max="100" value="50">
                <i class="fa-solid fa-volume-high"></i>
            </div>
            
            <audio id="audio" src=""></audio>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
